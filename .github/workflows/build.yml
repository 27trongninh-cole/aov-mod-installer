name: Build APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'config.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew clean assembleDebug

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep versionName app/build.gradle | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Mod_Ninstaller.apk

      - name: Delete old latest release
        run: gh release delete latest --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Mod Ninstaller v${{ steps.version.outputs.version }}"
          body: "Build tự động từ commit ${{ github.sha }}"
          files: app/build/outputs/apk/debug/Mod_Ninstaller.apk
          prerelease: false
